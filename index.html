class Runnable:
    def invoke(self, input): ...
    
    def __or__(self, other):
        # | operator creates a RunnableSequence
        return RunnableSequence(self, other)

# So this:
chain = prompt | llm | parser

from langchain_core.runnables import RunnableSequence
chain = RunnableSequence(first=prompt, middle=[llm], last=parser)

# Both invoke the same way

# You can inspect the chain
print(chain.steps)  # [prompt, llm, parser]

# RunnableLambda — wrap any Python function as a Runnable
from langchain_core.runnables import RunnableLambda

def add_context(text: str) -> str:
    return f"Context: {text}\\n\\nPlease analyze this."

result = chain.invoke("Some important text")

chain = (lambda x: {"input": x.upper()}) | prompt | llm | parser
# But RunnableLambda is more explicit and recommended` },

from langchain_core.output_parsers import StrOutputParser
from pydantic import BaseModel, Field

class SummaryBufferHistory(BaseChatMessageHistory, BaseModel):
    """Keep last K messages in full + compress older messages into a summary."""
    messages: List[BaseMessage] = Field(default_factory=list)
    summary: str = ""
    k: int = 6           # Number of recent messages to keep in full
    llm: object = None   # LLM for summarization

    class Config:

    def add_messages(self, messages: List[BaseMessage]) -> None:
        self.messages.extend(messages)
        if len(self.messages) > self.k:
            # Compress old messages (beyond k) into summary
            to_compress = self.messages[:-self.k]
            self.messages = self.messages[-self.k:]

        if self.summary:

        return self.messages

        self.messages = []

from functools import wraps

# Retry with exponential backoff
def with_retry(func, max_retries: int = 3, base_delay: float = 1.0):
    @wraps(func)
    async def wrapper(*args, **kwargs):
        for attempt in range(max_retries):
            try:
                return await func(*args, **kwargs)
            except Exception as e:
                if attempt == max_retries - 1:
                    raise  # Re-raise on final attempt
                delay = base_delay * (2 ** attempt)  # Exponential backoff
                print(f"Attempt {attempt+1} failed: {e}. Retrying in {delay}s...")

// ── STATE ─────────────────────────────────────────────────────
const state = {
  view: 'home',
  selectedModule: null,
  selectedLesson: null,
  expandedMods: {},
  completedAssignments: {},
  quizState: {}
};

function loadStorage() {
  try { state.completedAssignments = JSON.parse(localStorage.getItem('lc_progress') || '{}'); } catch(e){}
  try { state.quizState = JSON.parse(localStorage.getItem('lc_quiz') || '{}'); } catch(e){}
}
function saveProgress() { localStorage.setItem('lc_progress', JSON.stringify(state.completedAssignments)); }
function saveQuiz()     { localStorage.setItem('lc_quiz',     JSON.stringify(state.quizState)); }

// ── HELPERS ───────────────────────────────────────────────────
const allLessons = () => MODULES.flatMap(m => m.lessons.map(l => ({...l, _mod: m})));
const totalAssignments = () => MODULES.reduce((s,m) => s + m.lessons.reduce((ss,l) => ss + l.assignments.length, 0), 0);
const doneAssignments  = () => Object.values(state.completedAssignments).filter(Boolean).length;
const modPct = m => {
  const total = m.lessons.reduce((s,l)=>s+l.assignments.length,0);
  const done  = m.lessons.reduce((s,l)=>s+l.assignments.filter(a=>state.completedAssignments[a.id]).length,0);
  return total > 0 ? Math.round(done/total*100) : 0;
};
const lessPct = l => {
  if (!l.assignments.length) return 0;
  return Math.round(l.assignments.filter(a=>state.completedAssignments[a.id]).length/l.assignments.length*100);
};
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── NAVIGATION ────────────────────────────────────────────────
function goHome()   { state.view='home'; state.selectedModule=null; state.selectedLesson=null; render(); }

// ── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar() {
  const done = doneAssignments();
  const total = totalAssignments();
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  let html = `
    <div class="sb-header">
      <div class="sb-title">LangChain</div>
      <div class="sb-sub">AI Engineering Course</div>
    </div>
    <div class="sb-progress">
      <div class="sb-prog-label"><span>Overall Progress</span><span>${pct}%</span></div>
      <div class="sb-prog-bar"><div class="sb-prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sb-scroll">`;

  MODULES.forEach(m => {
    const isExpanded = !!state.expandedMods[m.id];
    const isActiveMod = state.selectedModule?.id === m.id;
    const mp = modPct(m);
    html += `
      <div class="sb-mod">
        <button class="sb-mod-btn ${isActiveMod?'active':''}" data-action="toggle-mod" data-modid="${m.id}" style="--accent:${m.accent}">
          <span class="sb-mod-icon">${m.icon}</span>
          <span class="sb-mod-label">
            <div class="sb-mod-num" style="color:${m.accent}">${m.num}</div>
            <div class="sb-mod-name">${m.title}</div>
          </span>
          <span class="sb-mod-chevron ${isExpanded?'open':''}">›</span>
        </button>
        <div class="sb-lessons ${isExpanded?'open':''}">`;
    m.lessons.forEach(l => {
      const lDone = lessPct(l) === 100;
      const isActiveLesson = state.selectedLesson?.id === l.id;
      html += `
          <button class="sb-lesson-btn ${isActiveLesson?'active':''}" data-action="go-lesson" data-modid="${m.id}" data-lessonid="${l.id}">
            <span class="sb-lesson-dot ${lDone?'done':''}"></span>
            <span class="sb-lesson-name ${isActiveLesson?'active':''}">${l.title}</span>
          </button>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  document.getElementById('sidebar').innerHTML = html;
}

// ── CONTENT BLOCKS ────────────────────────────────────────────
function renderBlocks(blocks) {
  return blocks.map(b => {
    if (b.type === 'text') {
      return `<div class="content-text">${escHtml(b.text)}</div>`;
    }
    if (b.type === 'callout') {
      const cls = b.variant === 'warning' ? 'callout-warning' : b.variant === 'tip' ? 'callout-tip' : 'callout-info';
      const icon = b.variant === 'warning' ? '⚠️' : b.variant === 'tip' ? '💡' : 'ℹ️';
      return `<div class="callout ${cls}">${icon} ${escHtml(b.text)}</div>`;
    }
    if (b.type === 'code') {
      const id = 'code-' + Math.random().toString(36).slice(2);
      return `
        <div class="code-block">
          <div class="code-header">
            <span class="code-lang">${b.lang || 'python'}</span>
            <button class="code-copy" onclick="copyCode('${id}')">copy</button>
          </div>
          <pre class="code-pre" id="${id}">${escHtml(b.code)}</pre>
        </div>`;
    }
    return '';
  }).join('');
}
function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = el.closest('.code-block').querySelector('.code-copy');
    if (btn) { btn.textContent = 'copied!'; setTimeout(() => btn.textContent = 'copy', 1500); }
  });
}

// ── QUIZ ──────────────────────────────────────────────────────
function renderQuiz(lesson, accent) {
  const quiz = QUIZZES[lesson.id];
  if (!quiz) return '';
  const id = lesson.id;
  const mcAns  = quiz.mc.filter((_,i) => state.quizState[`${id}_mc_${i}`]?.answered).length;
  const mcCorr = quiz.mc.filter((_,i) => state.quizState[`${id}_mc_${i}`]?.correct).length;
  const saRev  = quiz.sa.filter((_,i) => state.quizState[`${id}_sa_${i}`]?.revealed).length;
  const done = mcAns + saRev;
  const total = quiz.mc.length + quiz.sa.length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const isOpen = !!state.expandedMods['quiz_' + id];

  let mcHtml = quiz.mc.map((q,i) => {
    const sk = `${id}_mc_${i}`;
    const qs = state.quizState[sk] || {};
    const answered = qs.answered;
    const letters = ['A','B','C','D'];
    const optHtml = q.options.map((opt,oi) => {
      let cls = '';
      if (answered) {
        if (oi === q.correct) cls = 'correct';
        else if (oi === qs.selectedIndex && oi !== q.correct) cls = 'wrong';
      }
      const letter = answered && oi === q.correct ? '✓' : answered && oi === qs.selectedIndex ? '✗' : letters[oi];
      return `<div class="mc-option ${cls} ${answered?'answered':''}" data-action="mc-answer" data-lessonid="${id}" data-qi="${i}" data-oi="${oi}" data-correct="${q.correct}">
        <span class="mc-option-letter">${letter}</span>${escHtml(opt)}</div>`;
    }).join('');
    const expHtml = answered ? `<div class="mc-explanation"><strong>Explanation:</strong> ${escHtml(q.explanation)}</div>` : '';
    return `<div class="mc-card"><div class="mc-q"><span class="mc-qnum">Q${i+1}</span>${escHtml(q.q)}</div><div class="mc-options">${optHtml}</div>${expHtml}</div>`;
  }).join('');

  let saHtml = quiz.sa.map((q,i) => {
    const sk = `${id}_sa_${i}`;
    const qs = state.quizState[sk] || {};
    const revealed = !!qs.revealed;
    const modelHtml = revealed ? `<div class="sa-model open"><div class="sa-model-label">MODEL ANSWER</div><div class="sa-model-text">${escHtml(q.model)}</div><div class="sa-model-hint">Compare your answer — did you hit the key ideas? Self-score 1-5.</div></div>` : `<div class="sa-model"></div>`;
    const revBtn = revealed
      ? `<span class="sa-revealed-label">✓ revealed</span>`
      : `<button class="sa-reveal-btn" data-action="sa-reveal" data-lessonid="${id}" data-qi="${i}">Reveal Model Answer ↓</button>`;
    return `<div class="sa-card"><div class="sa-q"><span class="sa-qnum">SA${i+1}</span>${escHtml(q.q)}</div>
      <textarea class="sa-textarea" data-action="sa-type" data-lessonid="${id}" data-qi="${i}" placeholder="Write your answer here before revealing the model answer...">${escHtml(qs.userAnswer||'')}</textarea>
      <div class="sa-footer">${revBtn}</div>${modelHtml}</div>`;
  }).join('');

  const allDone = done === total && total > 0;
  const completeBanner = allDone ? `<div class="quiz-complete"><div class="quiz-complete-title">Quiz Complete!</div><div class="quiz-complete-sub">${mcCorr}/${quiz.mc.length} correct · ${saRev} SA reviewed</div></div>` : '';

  const scoreLabel = done > 0 ? `<div class="quiz-score" style="color:${accent}">${mcCorr}/${quiz.mc.length} correct · ${saRev}/${quiz.sa.length} SA</div>` : '';

  return `
    <div class="quiz-section" style="--accent:${accent}">
      <div class="quiz-header ${isOpen?'open':''}" data-action="toggle-quiz" data-lessonid="${id}">
        <div class="quiz-header-left">
          <div class="quiz-header-title">
            <span class="quiz-title-text">Lesson Quiz</span>
            <span class="badge-optional">OPTIONAL</span>
            <span class="badge-qcount">${quiz.mc.length} MC · ${quiz.sa.length} Short Answer</span>
          </div>
          <div class="quiz-subtitle">Test your understanding. MC gives instant feedback. SA reveals a model answer for self-grading.</div>
        </div>
        <div class="quiz-header-right">
          ${scoreLabel}
          <div class="quiz-chevron">${isOpen?'▲':'▼'}</div>
        </div>
      </div>
      <div class="quiz-body ${isOpen?'open':''}">
        <div class="quiz-prog-row">
          <div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:${pct}%"></div></div>
          <span class="quiz-prog-label">${done}/${total}</span>
        </div>
        <div class="quiz-section-label" style="color:#818CF8"><span class="quiz-dot" style="background:#818CF8"></span>Multiple Choice${mcAns===quiz.mc.length?` <span style="color:#059669;font-size:11px;font-family:'Fira Code',monospace">✓ ${mcCorr}/${quiz.mc.length} correct</span>`:''}</div>
        ${mcHtml}
        <div class="quiz-section-label" style="color:#FBBF24;margin-top:24px"><span class="quiz-dot" style="background:#FBBF24"></span>Short Answer <span style="font-size:11px;color:#6B7280;font-weight:400">Write your answer, then reveal the model answer</span></div>
        ${saHtml}
        ${completeBanner}
      </div>
    </div>`;
}

      </div>
    </div>
    <div class="module-overview">${m.overview}</div>
    <div class="progress-card">
      <div style="flex:1">
        <div class="progress-label">Module Progress</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${m.accent}"></div></div>
      </div>
      <div style="text-align:right">
        <div class="progress-pct-val" style="color:${m.accent}">${pct}%</div>
        <div class="progress-sub">${doneA}/${totalA} assignments</div>
      </div>
    </div>
    <div class="section-title">Lessons</div>
    ${lessonRows}
    <div class="project-card">
      <div class="project-banner">🎯 Module Project</div>
      <div class="project-title">${m.project.title}</div>
      <div class="project-time">⏱ ${m.project.time}</div>
      <div class="project-desc">${m.project.description}</div>
      <div class="skill-tags">${m.project.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
    </div>`;
}

function renderLessonView(m, l) {
  const al = allLessons();
  const idx = al.findIndex(x => x.id === l.id);
  const prev = al[idx-1];
  const next = al[idx+1];
  const doneCount = l.assignments.filter(a=>state.completedAssignments[a.id]).length;
  const assigns = l.assignments.map(a => renderAssignment(a)).join('');
  const navPrev = prev ? `<button class="nav-btn" data-action="go-lesson" data-modid="${prev._mod.id}" data-lessonid="${prev.id}">← ${prev.title.slice(0,35)}${prev.title.length>35?'...':''}</button>` : `<span></span>`;
  const navNext = next ? `<button class="nav-btn primary" data-action="go-lesson" data-modid="${next._mod.id}" data-lessonid="${next.id}" style="--accent:${m.accent}">Next: ${next.title.slice(0,30)}${next.title.length>30?'...':''} →</button>` : `<span></span>`;
  return `
    <div class="lesson-header">
      <div class="breadcrumb" data-action="go-module" data-modid="${m.id}" style="color:${m.accent}">← ${m.title}</div>
      <div class="lesson-title">${l.title}</div>
      <div class="meta-badges">
        <span class="meta-badge" style="background:${m.accent}20;color:${m.accent}">📖 ${l.readTime}</span>
        <span class="meta-badge" style="background:#1F2937;color:#9CA3AF">${l.assignments.length} assignments</span>
        ${doneCount>0?`<span class="meta-badge" style="background:#05966920;color:#059669">✓ ${doneCount}/${l.assignments.length} done</span>`:''}
      </div>
    </div>
    ${renderBlocks(l.content)}
    <div class="assign-section">
      <div class="assign-title">Assignments (${l.assignments.length})</div>
      ${assigns}
    </div>
    ${renderQuiz(l, m.accent)}
    <div class="nav-row">${navPrev}${navNext}</div>`;
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  renderSidebar();
  const el = document.getElementById('content');
  document.getElementById('main').scrollTop = 0;
  if (state.view === 'home') {
    el.innerHTML = renderHome();
  } else if (state.view === 'module' && state.selectedModule) {
    el.innerHTML = renderModuleView(state.selectedModule);
  } else if (state.view === 'lesson' && state.selectedModule && state.selectedLesson) {
    el.innerHTML = renderLessonView(state.selectedModule, state.selectedLesson);
  }
}

// ── EVENTS ────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'go-home') { goHome(); return; }

  if (action === 'toggle-mod') {
    const mid = el.dataset.modid;
    state.expandedMods[mid] = !state.expandedMods[mid];
    const m = MODULES.find(x=>x.id===mid);
    if (m && !state.expandedMods[mid]) { /* collapsed */ }
    // Open module page on click if not just toggling
    if (!e.target.closest('.sb-mod-chevron')) {
      const mod = MODULES.find(x=>x.id===mid);
      if (mod) { state.expandedMods[mid] = true; goModule(mod); return; }
    }
    render(); return;
  }

  if (action === 'go-module') {
    const m = MODULES.find(x=>x.id===el.dataset.modid);
    if (m) { state.expandedMods[m.id] = true; goModule(m); } return;
  }

  if (action === 'go-lesson') {
    const m = MODULES.find(x=>x.id===el.dataset.modid);
    const l = m?.lessons.find(x=>x.id===el.dataset.lessonid);
    if (m && l) { state.expandedMods[m.id] = true; goLesson(m, l); } return;
  }

  if (action === 'toggle-assign') {
    const aid = el.dataset.assignid;
    state.completedAssignments[aid] = !state.completedAssignments[aid];
    saveProgress();
    // Patch the DOM without full re-render
    const card = document.getElementById('acard-' + aid);
    if (card) {
      const done = state.completedAssignments[aid];
      card.classList.toggle('done', done);
      el.classList.toggle('done', done);
      el.textContent = done ? '✓' : '';
    }
    renderSidebar(); return;
  }

  if (action === 'mc-answer') {
    const {lessonid, qi, oi, correct} = el.dataset;
    const sk = `${lessonid}_mc_${qi}`;
    if (state.quizState[sk]?.answered) return; // already answered
    state.quizState[sk] = { answered: true, selectedIndex: +oi, correct: +oi === +correct };
    saveQuiz();
    render(); return;
  }

  if (action === 'sa-reveal') {
    const {lessonid, qi} = el.dataset;
    const sk = `${lessonid}_sa_${qi}`;
    const ta = el.closest('.sa-card')?.querySelector('textarea');
    state.quizState[sk] = { ...(state.quizState[sk]||{}), revealed: true, userAnswer: ta?.value || '' };
    saveQuiz();
    render(); return;
  }

  if (action === 'toggle-quiz') {
    const lid = el.dataset.lessonid;
    state.expandedMods['quiz_' + lid] = !state.expandedMods['quiz_' + lid];
    render(); return;
  }
});

// Save SA textarea text on input (without re-rendering)
document.addEventListener('input', function(e) {
  const el = e.target;
  if (el.dataset.action === 'sa-type') {
    const {lessonid, qi} = el.dataset;
    const sk = `${lessonid}_sa_${qi}`;
    state.quizState[sk] = { ...(state.quizState[sk]||{}), userAnswer: el.value };
    saveQuiz();
  }
});

// ── INIT ─────────────────────────────────────────────────────
loadStorage();
render();
</script>
</body>
</html>
